version: '3.9'
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clientcheck
      MYSQL_USER: clientcheck
      MYSQL_PASSWORD: clientcheck
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://clientcheck:clientcheck@mysql:3306/clientcheck
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  mysql_data:
