services:
  - type: web
    name: clientcheck-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/trpc/system.healthcheck
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_ID_MONTHLY
        value: price_1TDW8KA5TLBlpCILQe0qFO4n
      - key: STRIPE_PRICE_ID_YEARLY
        value: price_1TDW8DA5TLBlpCILStwOTXZf
      - key: EXPO_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_DSN
        sync: false
